<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | MemBrain</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <div class="app-frame">
        <nav class="navbar">
          <a class="brand" href="index.html"><span class="brand-mark">M</span><span>MemBrain</span></a>
          <div class="nav-links">
            <a class="nav-link" href="index.html">Landing</a>
            <a class="nav-link active" href="auth.html">Login / Sign Up</a>
          </div>
          <div class="nav-actions">
            <a class="btn btn-secondary" href="index.html">Back</a>
            <a class="btn btn-primary" href="dashboard.html">Continue as Guest</a>
          </div>
        </nav>

        <div class="center-wrap">
          <div class="auth-wrap">
            <section class="card auth-card">
              <div class="eyebrow">Priority Page 05</div>
              <h2>Login / Signup</h2>
              <p>Join the debate studio, save your decisions, and keep your multi-agent history in one place.</p>
              <div class="field-grid">
                <label>Email
                  <input type="email" placeholder="you@example.com" />
                </label>
                <label>Password
                  <input type="password" placeholder="Enter your password" />
                </label>
              </div>
              <div class="actions">
                <a class="btn btn-primary" href="dashboard.html">Login</a>
                <a class="btn btn-secondary" href="dashboard.html">Sign Up</a>
                <a class="btn btn-ghost" href="dashboard.html">Continue as Guest</a>
              </div>
              <p style="margin-top: 18px;">Need a quick demo? <a class="muted-link" href="dashboard.html">Enter the guest dashboard</a>.</p>
            </section>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
